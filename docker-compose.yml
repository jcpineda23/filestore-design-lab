version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: filestore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: filestore
      POSTGRES_USER: filestore
      POSTGRES_PASSWORD: filestore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filestore -d filestore"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
